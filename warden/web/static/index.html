<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Warden: Agent Reliability Supervisor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="brandmark" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M5 5 L5 27 L10 27" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M27 5 L27 27 L22 27" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="16" cy="16" r="3" fill="currentColor"/>
      </svg>
      <div>
        <h1>WARDEN</h1>
        <p class="tagline">the agent that governs your agents</p>
      </div>
    </div>
    <div class="topbar-right">
      <span class="badge" id="mode-badge">mode: …</span>
      <span class="badge tick" id="tick-badge">tick 0</span>
      <button id="reset-btn" class="btn ghost">Reset fleet</button>
    </div>
  </header>

  <section id="approval-banner" class="approval hidden">
    <div class="approval-text">
      <strong>Human-in-the-loop required.</strong>
      <span id="approval-detail"></span>
    </div>
    <div class="approval-actions">
      <button id="approve-btn" class="btn approve">Approve</button>
      <button id="deny-btn" class="btn deny">Deny</button>
    </div>
  </section>

  <section class="metrics" id="metrics">
    <div class="metric"><span class="m-label">Incidents</span><span class="m-value" id="m-incidents">0</span></div>
    <div class="metric"><span class="m-label">Avg time-to-detect</span><span class="m-value" id="m-mttd">n/a</span></div>
    <div class="metric good"><span class="m-label">$ recovered (hard)</span><span class="m-value" id="m-recovered">$0</span></div>
    <div class="metric bad"><span class="m-label">$ irreversible loss</span><span class="m-value" id="m-loss">$0</span></div>
    <div class="metric"><span class="m-label">$ loss prevented (est.)</span><span class="m-value" id="m-prevented">$0</span></div>
  </section>

  <main class="grid">
    <aside class="panel">
      <h2><span class="section-num">01 /</span> Fleet</h2>
      <div id="fleet" class="fleet"></div>
      <h2><span class="section-num">02 /</span> Inject a rogue scenario</h2>
      <div id="scenarios" class="scenarios"></div>
    </aside>

    <section class="panel feed-panel">
      <h2><span class="section-num">03 /</span> Warden live reasoning <span class="dim">(via Dynatrace MCP)</span></h2>
      <div id="feed" class="feed"></div>
    </section>

    <aside class="panel">
      <h2><span class="section-num">04 /</span> Incidents</h2>
      <div id="incidents" class="incidents"></div>
    </aside>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="modal-close" class="modal-close" title="Close (Esc)">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
